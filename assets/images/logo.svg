<svg xmlns="http://w3.org" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Circular Neon Background Gradient -->
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#141226"/>
      <stop offset="100%" stop-color="#05040a"/>
    </radialGradient>

    <!-- Glowing Cyan/Blue for 'D' -->
    <linearGradient id="cyanGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00f2fe"/>
      <stop offset="100%" stop-color="#4facfe"/>
    </linearGradient>

    <!-- Glowing Pink/Neon for 'J' -->
    <linearGradient id="pinkGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff0844"/>
      <stop offset="100%" stop-color="#ffb199"/>
    </linearGradient>

    <!-- High-intensity filters for Favicon visibility -->
    <filter id="glowCyan" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="12" result="blur1"/>
      <feGaussianBlur stdDeviation="4" result="blur2"/>
      <feMerge>
        <feMergeNode in="blur1"/>
        <feMergeNode in="blur2"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="glowPink" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="12" result="blur1"/>
      <feGaussianBlur stdDeviation="4" result="blur2"/>
      <feMerge>
        <feMergeNode in="blur1"/>
        <feMergeNode in="blur2"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Favicon Background Circle -->
  <circle cx="256" cy="256" r="256" fill="url(#bgGrad)"/>

  <!-- Outer Neon Ring (Vinyl/Music vibe) -->
  <circle cx="256" cy="256" r="236" fill="none" stroke="#ffffff" stroke-width="3" opacity="0.15"/>
  <circle cx="256" cy="256" r="220" fill="none" stroke="url(#cyanGrad)" stroke-width="4" stroke-dasharray="20 10" filter="url(#glowCyan)" opacity="0.4"/>

  <!-- Combined Monogram Group (Centered perfectly for small icons) -->
  <g transform="translate(10, 0)">
    <!-- Letter 'D' (Dhiraj) -->
    <text x="175" y="320" 
          font-family="'Montserrat', 'Arial Black', sans-serif" 
          font-size="210" 
          font-weight="900" 
          fill="url(#cyanGrad)" 
          filter="url(#glowCyan)" 
          text-anchor="middle">
      D
    </text>

    <!-- Letter 'J' (Jat) -->
    <text x="315" y="320" 
          font-family="'Montserrat', 'Arial Black', sans-serif" 
          font-size="210" 
          font-weight="900" 
          fill="url(#pinkGrad)" 
          filter="url(#glowPink)" 
          text-anchor="middle">
      J
    </text>
  </g>

  <!-- Small DJ Text at Bottom Center -->
  <text x="256" y="420" 
        font-family="'Montserrat', 'Arial', sans-serif" 
        font-size="36" 
        font-weight="900" 
        letter-spacing="12" 
        fill="#ffffff" 
        opacity="0.9" 
        text-anchor="middle">
    DJ
  </text>
</svg>
